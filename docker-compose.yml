services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kklrms}
      POSTGRES_USER: ${POSTGRES_USER:-kklrms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kklrms} -d ${POSTGRES_DB:-kklrms}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_BUILD_ID: ${BUILD_SHA:-dev}
        NEXT_PUBLIC_BUILD_TIME: ${BUILD_TIME:-}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3003}:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-kklrms}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-kklrms}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_KEY_PREFIX: ${REDIS_KEY_PREFIX:-kk-lrms}
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://kk-lrms.bmscloud.in.th}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?Set NEXTAUTH_SECRET in .env}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?Set ENCRYPTION_KEY in .env}
      BMS_VALIDATE_URL: ${BMS_VALIDATE_URL:-https://hosxp.net/phapi/PasteJSON}
      DEV_HOSPITAL_TUNNEL_URL: ${DEV_HOSPITAL_TUNNEL_URL:-}
      DEV_AUTH_BYPASS: ${DEV_AUTH_BYPASS:-false}
      DEV_SIMULATION_ENABLED: ${DEV_SIMULATION_ENABLED:-true}
      ADMIN_ALLOWED_CIDS: ${ADMIN_ALLOWED_CIDS:-}
      NEXT_PUBLIC_MOPH_OAUTH_CLIENT_ID: ${NEXT_PUBLIC_MOPH_OAUTH_CLIENT_ID:-}
      MOPH_OAUTH_CLIENT_SECRET: ${MOPH_OAUTH_CLIENT_SECRET:-}
      PROVIDER_API_CLIENT_ID: ${PROVIDER_API_CLIENT_ID:-}
      PROVIDER_API_SECRET_KEY: ${PROVIDER_API_SECRET_KEY:-}
      NEXT_PUBLIC_MOPH_OAUTH_URL: ${NEXT_PUBLIC_MOPH_OAUTH_URL:-https://moph.id.th}
      NEXT_PUBLIC_PROVIDER_API_URL: ${NEXT_PUBLIC_PROVIDER_API_URL:-https://provider.id.th}
