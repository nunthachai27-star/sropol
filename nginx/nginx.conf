# Main nginx config tuned for 300-500 concurrent SSE/dashboard users.
# Replaces the stock image config. The server block (the /sr-lrms reverse
# proxy) still lives in conf.d/default.conf, included at the bottom of http{}.
#
# Why this file exists: worker_connections / worker_rlimit_nofile live in the
# main config (events{} + top level), NOT in conf.d, so they can't be tuned
# from default.conf alone. Each SSE user holds ~2 long-lived connections
# (client↔nginx + nginx↔app), so 500 users ≈ 1,000+ concurrent connections.

user  nginx;
worker_processes  auto;            # one worker per CPU core
worker_rlimit_nofile  65536;       # max open file descriptors per worker

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;      # per worker; × cores = total capacity
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    server_tokens      off;

    # Compress JSON/text API + asset responses (SSE streams set buffering off
    # per-location in default.conf, so they are unaffected).
    gzip               on;
    gzip_proxied       any;
    gzip_min_length    1024;
    gzip_types         text/plain text/css application/json application/javascript
                       application/xml text/javascript image/svg+xml;

    include /etc/nginx/conf.d/*.conf;
}
