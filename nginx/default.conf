# KK-LRMS reverse proxy — serves the app under the /sr-lrms sub-path.
#
# TLS is terminated upstream (cloud / edge proxy), which forwards plain HTTP to
# this nginx with X-Forwarded-Proto: https. This file lives at
# /etc/nginx/conf.d/default.conf (included inside the stock image's http{} block,
# so the map directive below is valid here).
#
# The app runs with Next.js basePath="/sr-lrms" (NEXT_PUBLIC_BASE_PATH), so we
# proxy_pass WITHOUT a URI part to preserve the /sr-lrms prefix verbatim
# (pass-through, NOT strip) — the app's routes, /_next assets and /api all live
# under /sr-lrms and must reach the upstream with that prefix intact.

# Honor the proto the edge terminator reports; fall back to the local scheme.
map $http_x_forwarded_proto $kk_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

upstream kk_lrms_app {
    server app:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Don't cap upload size for bulk hospital imports / webhook snapshots.
    client_max_body_size 25m;

    # Emit relative redirects (Location: /sr-lrms/ instead of
    # http://$host/sr-lrms/). Without this, nginx builds an absolute URL from
    # its own listen context — forcing http:// and dropping the real port —
    # which behind the upstream TLS terminator causes a scheme-downgrade hop.
    absolute_redirect off;

    # Convenience: bare root redirects into the app sub-path.
    location = / {
        return 302 /sr-lrms/;
    }

    location /sr-lrms {
        proxy_pass http://kk_lrms_app;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $kk_forwarded_proto;
        proxy_set_header X-Forwarded-Host  $host;

        # Server-Sent Events (/sr-lrms/api/sse/dashboard) need an unbuffered,
        # long-lived stream. These settings also leave normal JSON responses
        # unaffected.
        proxy_set_header Connection        '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
    }
}
